<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
    text-align: center;
  }
  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 48px 36px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    max-width: 420px;
    animation: fadeUp 0.8s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .code { font-size: 72px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
  .text { font-size: 14px; color: rgba(255, 255, 255, 0.6); line-height: 1.6; margin-bottom: 28px; }
  .btn {
    display: inline-block;
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <div class="title">Страница не найдена</div>
  <div class="text">Такой страницы не существует. Возможно, она была перемещена или удалена.</div>
  <a class="btn" href="/supercat/">На главную</a>
</div>
</body>
</html>
