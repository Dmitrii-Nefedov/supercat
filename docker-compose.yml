services:
  web:
    build:
      context: .
      target: web
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  cli:
    build:
      context: .
      target: cli
    environment:
      - TZ=UTC
    profiles:
      - cli
    command: ["--help"]
