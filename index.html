<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прогноз погоды</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#302b63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Погода">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🌤️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 36px 28px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeUp 0.8s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .search-container {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    position: relative;
  }

  .search-wrapper {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .search-input::placeholder {
    color: rgba(255, 255, 255, 0.35);
  }

  .search-input:focus {
    border-color: rgba(255, 255, 255, 0.35);
    background: rgba(255, 255, 255, 0.1);
  }

  .locate-btn {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }

  .locate-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .locate-btn:active {
    transform: translateY(0);
  }

  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: rgba(30, 25, 60, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
    z-index: 100;
    max-height: 240px;
    overflow-y: auto;
    display: none;
  }

  .search-results.visible {
    display: block;
  }

  .search-result-item {
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 14px;
  }

  .search-result-item:first-child {
    border-radius: 16px 16px 0 0;
  }

  .search-result-item:last-child {
    border-radius: 0 0 16px 16px;
  }

  .search-result-item:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .search-result-item .result-name {
    font-weight: 500;
  }

  .search-result-item .result-detail {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    font-weight: 300;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .city h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .city .city-sub {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.45);
    font-weight: 300;
    margin-top: 2px;
  }

  .city .date {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin-top: 4px;
    font-weight: 300;
  }

  .main-weather {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding: 10px 0;
  }

  .temp-group {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .temp-current {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    animation: pulseTemp 3s ease-in-out infinite;
  }

  @keyframes pulseTemp {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .temp-unit {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.5);
  }

  .weather-icon {
    font-size: 64px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(255, 255, 255, 0.1));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .condition {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 6px;
  }

  .feels-like {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 300;
  }

  .details {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .detail-item {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    animation: fadeUp 0.8s ease-out backwards;
  }

  .detail-item:nth-child(1) { animation-delay: 0.05s; }
  .detail-item:nth-child(2) { animation-delay: 0.1s; }
  .detail-item:nth-child(3) { animation-delay: 0.15s; }
  .detail-item:nth-child(4) { animation-delay: 0.2s; }
  .detail-item:nth-child(5) { animation-delay: 0.25s; }
  .detail-item:nth-child(6) { animation-delay: 0.3s; }
  .detail-item:nth-child(7) { animation-delay: 0.35s; }
  .detail-item:nth-child(8) { animation-delay: 0.4s; }

  .detail-item:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.1);
  }

  .detail-icon { font-size: 22px; margin-bottom: 6px; }
  .detail-value { font-size: 18px; font-weight: 600; }
  .detail-label { font-size: 11px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .forecast-title {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }

  .forecast {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .forecast-day {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 14px 6px;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    animation: fadeUp 0.8s ease-out backwards;
  }

  .forecast-day:nth-child(1) { animation-delay: 0.15s; }
  .forecast-day:nth-child(2) { animation-delay: 0.25s; }
  .forecast-day:nth-child(3) { animation-delay: 0.35s; }
  .forecast-day:nth-child(4) { animation-delay: 0.45s; }
  .forecast-day:nth-child(5) { animation-delay: 0.55s; }
  .forecast-day:nth-child(6) { animation-delay: 0.65s; }
  .forecast-day:nth-child(7) { animation-delay: 0.75s; }

  .forecast-day:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.12);
  }

  .forecast-day .day-name {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 6px;
  }

  .forecast-day .day-icon {
    font-size: 28px;
    margin-bottom: 4px;
  }

  .forecast-day .day-high {
    font-size: 16px;
    font-weight: 600;
  }

  .forecast-day .day-low {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 300;
  }

  .error {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.6);
  }

  .error .error-icon { font-size: 48px; margin-bottom: 12px; }
  .error .error-text { font-size: 16px; font-weight: 300; }

  .attribution {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    font-weight: 300;
  }

  .attribution a {
    color: rgba(255, 255, 255, 0.35);
    text-decoration: none;
  }

  .attribution a:hover {
    color: rgba(255, 255, 255, 0.6);
  }

  .locating {
    opacity: 0.5;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; border-radius: 24px; }
    .temp-current { font-size: 56px; }
    .weather-icon { font-size: 48px; }
    .details { grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-item { padding: 12px 8px; }
    .detail-value { font-size: 15px; }
    .forecast { gap: 4px; }
    .forecast-day { padding: 10px 4px; }
    .hourly-scroll { gap: 8px; padding: 8px 0; }
    .hourly-item { min-width: 64px; padding: 10px 6px; }
    .hourly-item .hourly-temp { font-size: 15px; }
    .forecast-toggle { gap: 0; }
    .forecast-toggle button { padding: 8px 14px; font-size: 12px; }
  }

  /* ===== Weather Background Themes ===== */
  body {
    transition: background 1.5s ease;
  }

  body[data-weather="sunny"] {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #fda085 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
  }
  body[data-weather="clear-night"] {
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #1a1a4e 100%);
  }
  body[data-weather="cloudy"] {
    background: linear-gradient(135deg, #667db6 0%, #6082b6 40%, #4a6fa5 100%);
    background-size: 400% 400%;
    animation: gradientShift 18s ease infinite;
  }
  body[data-weather="foggy"] {
    background: linear-gradient(135deg, #606c88 0%, #3f4c6b 100%);
  }
  body[data-weather="rainy"] {
    background: linear-gradient(135deg, #373b44 0%, #4286f4 100%);
  }
  body[data-weather="snowy"] {
    background: linear-gradient(135deg, #e6dada 0%, #b2c2d1 50%, #8ba3c7 100%);
  }
  body[data-weather="thunderstorm"] {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body[data-weather="snowy"] .card,
  body[data-weather="foggy"] .card {
    color: #1a1a2e;
  }
  body[data-weather="snowy"] .search-input,
  body[data-weather="foggy"] .search-input {
    color: #1a1a2e;
    border-color: rgba(0,0,0,0.15);
  }
  body[data-weather="snowy"] .search-input::placeholder,
  body[data-weather="foggy"] .search-input::placeholder {
    color: rgba(0,0,0,0.35);
  }
  body[data-weather="snowy"] .search-input:focus,
  body[data-weather="foggy"] .search-input:focus {
    border-color: rgba(0,0,0,0.35);
    background: rgba(255,255,255,0.3);
  }
  body[data-weather="snowy"] .detail-item,
  body[data-weather="foggy"] .detail-item,
  body[data-weather="snowy"] .forecast-day,
  body[data-weather="foggy"] .forecast-day,
  body[data-weather="snowy"] .hourly-item,
  body[data-weather="foggy"] .hourly-item {
    background: rgba(0,0,0,0.08);
  }
  body[data-weather="snowy"] .detail-item:hover,
  body[data-weather="foggy"] .detail-item:hover {
    background: rgba(0,0,0,0.15);
  }

  /* Rain overlay — multi-layer streaks */
  body[data-weather="rainy"]::before,
  body[data-weather="thunderstorm"]::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      repeating-linear-gradient(
        82deg,
        transparent,
        transparent 5px,
        rgba(174, 202, 238, 0.07) 5px,
        rgba(174, 202, 238, 0.07) 6px
      ),
      repeating-linear-gradient(
        78deg,
        transparent,
        transparent 9px,
        rgba(174, 202, 238, 0.05) 9px,
        rgba(174, 202, 238, 0.05) 10px
      ),
      repeating-linear-gradient(
        85deg,
        transparent,
        transparent 7px,
        rgba(174, 202, 238, 0.06) 7px,
        rgba(174, 202, 238, 0.06) 8px
      );
    background-size: 100% 15px, 100% 25px, 100% 20px;
    animation: rainFall 0.4s linear infinite;
  }

  body[data-weather="thunderstorm"]::before {
    opacity: 0.8;
  }

  /* Lightning flash for thunderstorm */
  @keyframes lightning {
    0%, 92%, 96%, 100% { opacity: 1; }
    93%, 95% { opacity: 0.3; }
    97%, 99% { opacity: 0.5; }
  }

  body[data-weather="thunderstorm"]::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: rgba(255, 255, 255, 0.06);
    animation: lightning 8s ease infinite;
  }

  /* ===== Forecast Toggle ===== */
  .forecast-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
  }

  .forecast-toggle button {
    padding: 8px 20px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: rgba(255, 255, 255, 0.5);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .forecast-toggle button.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .forecast-toggle button:hover:not(.active) {
    color: rgba(255, 255, 255, 0.8);
  }

  /* ===== Hourly Forecast ===== */
  .hourly-container {
    display: none;
  }
  .hourly-container.visible {
    display: block;
  }

  .hourly-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 8px 4px 12px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .hourly-scroll::-webkit-scrollbar {
    height: 4px;
  }
  .hourly-scroll::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
  }
  .hourly-scroll::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 4px;
  }

  .hourly-item {
    flex-shrink: 0;
    min-width: 76px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 14px 8px;
    text-align: center;
    scroll-snap-align: start;
    transition: transform 0.2s, background 0.2s;
    animation: fadeUp 0.6s ease-out backwards;
  }

  .hourly-item:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.1);
  }

  .hourly-item.now {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  .hourly-item .hourly-time {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 6px;
  }

  .hourly-item .hourly-icon {
    font-size: 24px;
    margin-bottom: 4px;
  }

  .hourly-item .hourly-temp {
    font-size: 17px;
    font-weight: 600;
  }

  .hourly-item .hourly-precip {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
    margin-top: 2px;
  }

  /* ===== Precipitation Bar ===== */
  .precip-bar {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .precip-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #74b9ff, #0984e3);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ===== Day/Night indicator for forecast ===== */
  .forecast-day .day-precip {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
    margin-top: 2px;
  }

  /* ===== Controls (unit/theme toggles) ===== */
  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .controls button {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.5);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .controls button.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .controls button:hover:not(.active) {
    color: rgba(255, 255, 255, 0.8);
  }

  body[data-weather="snowy"] .controls button,
  body[data-weather="foggy"] .controls button {
    background: rgba(0,0,0,0.06);
    color: rgba(0,0,0,0.5);
  }

  body[data-weather="snowy"] .controls button.active,
  body[data-weather="foggy"] .controls button.active {
    background: rgba(0,0,0,0.12);
    color: #000;
  }

  /* ===== Theme Toggle ===== */
  .control-separator {
    width: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 4px 4px;
  }

  body[data-weather="snowy"] .control-separator,
  body[data-weather="foggy"] .control-separator {
    background: rgba(0,0,0,0.1);
  }

  /* ===== Light Theme ===== */
  body[data-theme="light"] .card {
    background: rgba(255, 255, 255, 0.82);
    color: #1a1a2e;
    border-color: rgba(255, 255, 255, 0.4);
  }

  body[data-theme="light"] .search-input {
    color: #1a1a2e;
    border-color: rgba(0,0,0,0.12);
    background: rgba(255, 255, 255, 0.5);
  }

  body[data-theme="light"] .search-input::placeholder {
    color: rgba(0,0,0,0.3);
  }

  body[data-theme="light"] .search-input:focus {
    border-color: rgba(0,0,0,0.25);
    background: rgba(255, 255, 255, 0.7);
  }

  body[data-theme="light"] .detail-item,
  body[data-theme="light"] .forecast-day,
  body[data-theme="light"] .hourly-item,
  body[data-theme="light"] .forecast-toggle {
    background: rgba(0,0,0,0.05);
  }

  body[data-theme="light"] .detail-item:hover,
  body[data-theme="light"] .forecast-day:hover,
  body[data-theme="light"] .hourly-item:hover {
    background: rgba(0,0,0,0.1);
  }

  body[data-theme="light"] .hourly-item.now {
    background: rgba(0,0,0,0.1);
    border-color: rgba(0,0,0,0.15);
  }

  body[data-theme="light"] .forecast-toggle button.active {
    background: rgba(0,0,0,0.1);
    color: #1a1a2e;
  }

  body[data-theme="light"] .controls button {
    background: rgba(0,0,0,0.04);
    color: rgba(0,0,0,0.45);
  }

  body[data-theme="light"] .controls button.active {
    background: rgba(0,0,0,0.1);
    color: #1a1a2e;
  }

  body[data-theme="light"] .control-separator {
    background: rgba(0,0,0,0.1);
  }

  body[data-theme="light"] .locate-btn {
    border-color: rgba(0,0,0,0.12);
    background: rgba(255, 255, 255, 0.5);
  }

  body[data-theme="light"] .locate-btn:hover {
    background: rgba(255, 255, 255, 0.8);
  }

  body[data-theme="light"] .search-results {
    background: rgba(255, 255, 255, 0.95);
    border-color: rgba(0,0,0,0.08);
  }

  body[data-theme="light"] .search-result-item:hover {
    background: rgba(0,0,0,0.04);
  }

  body[data-theme="light"] .search-result-item .result-detail {
    color: rgba(0,0,0,0.4);
  }

  body[data-theme="light"] .attribution,
  body[data-theme="light"] .attribution a {
    color: rgba(0,0,0,0.4);
  }

  body[data-theme="light"] .spinner {
    border-color: rgba(0,0,0,0.1);
    border-top-color: #1a1a2e;
  }

  body[data-theme="light"] .loader-text {
    color: rgba(0,0,0,0.4);
  }

  /* ===== Section separator ===== */
  .daily-container.visible {
    display: block;
  }

  .forecast-section {
    margin-top: 8px;
  }

  /* Snow overlay — drifting snowflakes */
  body[data-weather="snowy"]::before {
    content: '';
    position: fixed;
    inset: -10px;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(3px 3px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 25% 50%, rgba(255,255,255,0.4), transparent),
      radial-gradient(4px 4px at 40% 10%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 55% 70%, rgba(255,255,255,0.5), transparent),
      radial-gradient(3px 3px at 70% 40%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 85% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(3px 3px at 95% 15%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 15% 90%, rgba(255,255,255,0.35), transparent),
      radial-gradient(2px 2px at 50% 35%, rgba(255,255,255,0.4), transparent),
      radial-gradient(3px 3px at 65% 60%, rgba(255,255,255,0.3), transparent);
    background-size: 200px 200px, 180px 180px, 220px 220px, 160px 160px, 190px 190px,
                     170px 170px, 210px 210px, 150px 150px, 200px 200px, 230px 230px;
    background-position: 0 0, 20px 10px, 40px 20px, 10px 30px, 50px 5px,
                         30px 15px, 60px 25px, 5px 35px, 45px 12px, 25px 28px;
    animation: snowFall 8s linear infinite;
  }

  @keyframes rainFall {
    from { background-position: 0 0, 0 0, 0 0; }
    to { background-position: 0 25px, 0 35px, 0 30px; }
  }

  @keyframes snowFall {
    from { transform: translateY(-20px); }
    to { transform: translateY(20px); }
  }

  body[data-weather="snowy"] .card,
  body[data-weather="rainy"] .card,
  body[data-weather="thunderstorm"] .card {
    position: relative;
    z-index: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    body, body[data-weather] { animation: none !important; transition: none !important; }
    body[data-weather]::before, body[data-weather]::after { animation: none !important; }
    .temp-current, .weather-icon, .card { animation: none !important; opacity: 1 !important; }
    .detail-item, .forecast-day, .hourly-item { animation: none !important; opacity: 1 !important; }
    .spinner { animation: none !important; }
    body[data-weather] .weather-icon { animation: none !important; }
  }

  /* ===== Animated Weather Icons ===== */
  body[data-weather="sunny"] .weather-icon {
    animation: spinSlow 12s linear infinite, float 4s ease-in-out infinite;
  }

  body[data-weather="cloudy"] .weather-icon {
    animation: cloudDrift 6s ease-in-out infinite, float 4s ease-in-out infinite;
  }

  body[data-weather="rainy"] .weather-icon {
    animation: rainBounce 1s ease-in-out infinite, float 4s ease-in-out infinite;
  }

  body[data-weather="thunderstorm"] .weather-icon {
    animation: flash 3s ease-in-out infinite, float 4s ease-in-out infinite;
  }

  body[data-weather="snowy"] .weather-icon {
    animation: snowDrift 5s ease-in-out infinite, float 4s ease-in-out infinite;
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes cloudDrift {
    0%, 100% { transform: translateX(0) scale(1); }
    50% { transform: translateX(6px) scale(1.05); }
  }

  @keyframes rainBounce {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-4px) rotate(-5deg); }
    75% { transform: translateY(2px) rotate(3deg); }
  }

  @keyframes flash {
    0%, 90%, 100% { opacity: 1; transform: scale(1); }
    92% { opacity: 0.3; transform: scale(1.2); }
    95% { opacity: 1; transform: scale(1); }
    97% { opacity: 0.5; transform: scale(1.1); }
  }

  @keyframes snowDrift {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-3px) rotate(-8deg); }
    75% { transform: translateY(3px) rotate(8deg); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card" id="app" aria-live="polite" aria-label="Прогноз погоды">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Загружаем погоду...</div>
    </div>
  </div>
  <div class="attribution">Данные: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · Геокодинг: <a href="https://open-meteo.com/en/docs/geocoding-api" target="_blank" rel="noopener">Open-Meteo Geocoding</a></div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  const GEO_API = 'https://geocoding-api.open-meteo.com/v1/search';
  const WX_API = 'https://api.open-meteo.com/v1/forecast';

  const STORAGE_KEY = 'supercat_weather_city';

  const DEFAULT_CITY = {
    name: 'Москва',
    country: 'Россия',
    latitude: 55.7558,
    longitude: 37.6173,
    timezone: 'Europe/Moscow'
  };

  const wmoCodes = {
    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌦️', 56: '🌧️', 57: '🌧️',
    61: '🌧️', 63: '🌧️', 65: '🌧️', 66: '🌧️', 67: '🌧️',
    71: '🌨️', 73: '🌨️', 75: '🌨️', 77: '🌨️',
    80: '🌦️', 81: '🌦️', 82: '🌦️', 85: '🌨️', 86: '🌨️',
    95: '⛈️', 96: '⛈️', 99: '⛈️'
  };

  const wmoDescriptions = {
    0: 'Ясно', 1: 'Преимущественно ясно', 2: 'Переменная облачность', 3: 'Пасмурно',
    45: 'Туман', 48: 'Изморозь', 51: 'Лёгкая морось', 53: 'Морось', 55: 'Сильная морось',
    56: 'Ледяная морось', 57: 'Сильная ледяная морось',
    61: 'Небольшой дождь', 63: 'Дождь', 65: 'Сильный дождь',
    66: 'Ледяной дождь', 67: 'Сильный ледяной дождь',
    71: 'Небольшой снег', 73: 'Снег', 75: 'Сильный снег', 77: 'Снежные зёрна',
    80: 'Ливень', 81: 'Сильный ливень', 82: 'Шквалистый ливень',
    85: 'Снегопад', 86: 'Сильный снегопад',
    95: 'Гроза', 96: 'Гроза с градом', 99: 'Сильная гроза с градом'
  };

  let selectedCity = loadCity();
  let searchTimeout = null;

  function loadCity() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch {}
    return DEFAULT_CITY;
  }

  function saveCity(city) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(city));
    } catch {}
  }

  const UNIT_KEY = 'supercat_weather_unit';
  let currentUnit = loadUnit();

  function loadUnit() {
    try {
      const saved = localStorage.getItem(UNIT_KEY);
      if (saved === 'F') return 'F';
    } catch {}
    return 'C';
  }

  function saveUnit(unit) {
    try { localStorage.setItem(UNIT_KEY, unit); } catch {}
  }

  function convertTemp(celsius, unit) {
    if (unit === 'F') return Math.round(celsius * 9 / 5 + 32);
    return Math.round(celsius);
  }

  function tempLabel(unit) {
    return unit === 'F' ? '°F' : '°C';
  }

  const THEME_KEY = 'supercat_weather_theme';
  let currentTheme = loadTheme();

  function loadTheme() {
    try {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'light' || saved === 'dark') return saved;
    } catch {}
    return 'dark';
  }

  function saveTheme(theme) {
    try { localStorage.setItem(THEME_KEY, theme); } catch {}
  }

  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme);
  }

  function getDayName(dateStr, index) {
    if (index === 0) return 'Сегодня';
    if (index === 1) return 'Завтра';
    const date = new Date(dateStr + 'T12:00:00');
    const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    return days[date.getDay()];
  }

  function isDaytime(sunriseStr, sunsetStr) {
    if (!sunriseStr || !sunsetStr) return true;
    const now = new Date();
    const rise = new Date(sunriseStr);
    const set = new Date(sunsetStr);
    return now >= rise && now < set;
  }

  function windDirection(degrees) {
    if (degrees == null) return '—';
    const dirs = ['С', 'ССВ', 'СВ', 'ВСВ', 'В', 'ВЮВ', 'ЮВ', 'ЮЮВ', 'Ю', 'ЮЮЗ', 'ЮЗ', 'ЗЮЗ', 'З', 'ЗСЗ', 'СЗ', 'ССЗ'];
    return dirs[Math.round(degrees / 22.5) % 16];
  }

  function setWeatherTheme(code, isDay) {
    let theme;
    if (code === 0 || code === 1) theme = isDay ? 'sunny' : 'clear-night';
    else if (code === 2 || code === 3) theme = 'cloudy';
    else if (code >= 45 && code <= 48) theme = 'foggy';
    else if ((code >= 51 && code <= 57) || (code >= 61 && code <= 67) || (code >= 80 && code <= 82)) theme = 'rainy';
    else if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) theme = 'snowy';
    else if (code >= 95 && code <= 99) theme = 'thunderstorm';
    else theme = isDay ? 'sunny' : 'clear-night';
    document.body.setAttribute('data-weather', theme);
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    const m = dateStr.match(/T(\d{2}:\d{2})/);
    return m ? m[1] : '';
  }

  function renderHourly(hourly, timezone) {
    const now = new Date();
    const tz = timezone || 'Europe/Moscow';
    const formatter = new Intl.DateTimeFormat('ru-RU', { timeZone: tz, hour: 'numeric', hour12: false });
    const currentHour = parseInt(formatter.format(now), 10);
    let html = '';
    for (let i = 0; i < hourly.time.length; i++) {
      const hourNum = parseInt(hourly.time[i].substring(11, 13), 10);
      const isNow = hourNum === currentHour;
      const hCode = hourly.weather_code[i];
      const precip = hourly.precipitation_probability[i];
      const hDesc = wmoDescriptions[hCode] || '';
      html += `<div class="hourly-item${isNow ? ' now' : ''}" style="animation-delay:${i * 0.03}s">
        <div class="hourly-time">${isNow ? 'Сейчас' : String(hourNum).padStart(2, '0') + ':00'}</div>
        <div class="hourly-icon" role="img" aria-label="${hDesc}">${wmoCodes[hCode] || '🌤️'}</div>
        <div class="hourly-temp">${convertTemp(hourly.temperature_2m[i], currentUnit)}${tempLabel(currentUnit)}</div>
        ${precip != null ? `<div class="hourly-precip">${Math.round(precip)}%</div>` : ''}
      </div>`;
    }
    return html;
  }

  function renderWeather(data, city) {
    const current = data.current;
    const daily = data.daily;
    const hourly = data.hourly;
    const code = current.weather_code;
    const icon = wmoCodes[code] || '🌤️';
    const desc = wmoDescriptions[code] || '';

    const day = isDaytime(daily.sunrise ? daily.sunrise[0] : null, daily.sunset ? daily.sunset[0] : null);
    setWeatherTheme(code, day);

    const today = new Date();
    const dateStr = today.toLocaleDateString('ru-RU', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    const sunrise = daily.sunrise ? formatTime(daily.sunrise[0]) : '';
    const sunset = daily.sunset ? formatTime(daily.sunset[0]) : '';

    let forecastHtml = '';
    for (let i = 0; i < 7; i++) {
      const dayCode = daily.weather_code[i];
      const precip = daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : null;
      const dayDesc = wmoDescriptions[dayCode] || '';
      forecastHtml += `<div class="forecast-day">
        <div class="day-name">${getDayName(daily.time[i], i)}</div>
        <div class="day-icon" role="img" aria-label="${dayDesc}">${wmoCodes[dayCode] || '🌤️'}</div>
        <div class="day-high">${convertTemp(daily.temperature_2m_max[i], currentUnit)}${tempLabel(currentUnit)}</div>
        <div class="day-low">${convertTemp(daily.temperature_2m_min[i], currentUnit)}${tempLabel(currentUnit)}</div>
        ${precip != null ? `<div class="day-precip">💧 ${Math.round(precip)}%</div>` : ''}
      </div>`;
    }

    const hourlyHtml = hourly && hourly.time ? renderHourly(hourly, city.timezone || 'Europe/Moscow') : '';

    app.innerHTML = `
      <div class="search-container">
        <div class="search-wrapper">
          <input class="search-input" id="searchInput" type="text" placeholder="Поиск города..." autocomplete="off" aria-label="Поиск города" role="combobox" aria-expanded="false" aria-controls="searchResults">
          <div class="search-results" id="searchResults" role="listbox" aria-label="Результаты поиска"></div>
        </div>
        <button class="locate-btn" id="locateBtn" title="Моё местоположение" type="button" aria-label="Определить местоположение">📍</button>
      </div>
      <div class="controls">
        <button class="unit-toggle${currentUnit === 'F' ? '' : ' active'}" data-unit="C">°C</button>
        <button class="unit-toggle${currentUnit === 'F' ? ' active' : ''}" data-unit="F">°F</button>
        <span class="control-separator"></span>
        <button class="theme-toggle${currentTheme === 'light' ? ' active' : ''}" data-theme="light">☀️</button>
        <button class="theme-toggle${currentTheme === 'dark' ? ' active' : ''}" data-theme="dark">🌙</button>
      </div>
      <div class="header">
        <div class="city">
          <h1>${city.name}</h1>
          <div class="city-sub">${city.country || ''}</div>
          <div class="date">${dateStr}</div>
        </div>
      </div>
      <div class="main-weather">
        <div>
          <div class="condition">${desc}</div>
          <div class="temp-group">
            <span class="temp-current">${convertTemp(current.temperature_2m, currentUnit)}</span>
            <span class="temp-unit">${tempLabel(currentUnit)}</span>
          </div>
          <div class="feels-like">Ощущается как ${convertTemp(current.apparent_temperature, currentUnit)}${tempLabel(currentUnit)}</div>
        </div>
        <div class="weather-icon" role="img" aria-label="${desc}">${icon}</div>
      </div>
      <div class="details">
        <div class="detail-item">
          <div class="detail-icon">💧</div>
          <div class="detail-value">${current.relative_humidity_2m}%</div>
          <div class="detail-label">Влажность</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">💨</div>
          <div class="detail-value">${Math.round(current.wind_speed_10m)} <span style="font-size:12px;font-weight:300">км/ч</span></div>
          <div class="detail-label">Ветер</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">📊</div>
          <div class="detail-value">${current.surface_pressure != null ? Math.round(current.surface_pressure) : '—'}</div>
          <div class="detail-label">Давление</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">☁️</div>
          <div class="detail-value">${current.cloud_cover}%</div>
          <div class="detail-label">Облачность</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">🌅</div>
          <div class="detail-value" style="font-size:15px">${sunrise || '—'}</div>
          <div class="detail-label">Рассвет</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">🌇</div>
          <div class="detail-value" style="font-size:15px">${sunset || '—'}</div>
          <div class="detail-label">Закат</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">☀️</div>
          <div class="detail-value">${current.uv_index != null ? current.uv_index.toFixed(1) : '—'}</div>
          <div class="detail-label">УФ-индекс</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">🧭</div>
          <div class="detail-value">${windDirection(current.wind_direction_10m)}</div>
          <div class="detail-label">Направление ветра</div>
        </div>
      </div>
      <div class="forecast-toggle" id="forecastToggle">
        <button class="active" data-view="daily" aria-pressed="true">На день</button>
        <button data-view="hourly" aria-pressed="false">Почасово</button>
      </div>
      <div class="daily-container visible" id="dailyContainer">
        <div class="forecast-title">Прогноз на неделю</div>
        <div class="forecast">${forecastHtml}</div>
      </div>
      <div class="hourly-container" id="hourlyContainer">
        <div class="forecast-title">Следующие 24 часа</div>
        <div class="hourly-scroll">${hourlyHtml}</div>
      </div>
    `;

    bindSearchUI(city);
    bindForecastToggle();
    bindUnitToggle();
    bindThemeToggle();
  }

  function bindUnitToggle() {
    document.querySelectorAll('.unit-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const unit = this.dataset.unit;
        if (unit === currentUnit) return;
        currentUnit = unit;
        saveUnit(unit);
        document.body.setAttribute('data-unit', unit);
        fetchWeather(selectedCity);
      });
    });
  }

  function bindThemeToggle() {
    document.querySelectorAll('.theme-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const theme = this.dataset.theme;
        if (theme === currentTheme) return;
        currentTheme = theme;
        saveTheme(theme);
        document.querySelectorAll('.theme-toggle').forEach(function(b) {
          b.classList.toggle('active', b.dataset.theme === theme);
        });
        applyTheme(theme);
      });
    });
  }

  function bindForecastToggle() {
    const toggle = document.getElementById('forecastToggle');
    const daily = document.getElementById('dailyContainer');
    const hourly = document.getElementById('hourlyContainer');
    if (!toggle || !daily || !hourly) return;
    toggle.addEventListener('click', function(e) {
      const btn = e.target.closest('button');
      if (!btn) return;
      const view = btn.dataset.view;
      toggle.querySelectorAll('button').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      daily.classList.toggle('visible', view === 'daily');
      hourly.classList.toggle('visible', view === 'hourly');
    });
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="search-container">
        <div class="search-wrapper">
          <input class="search-input" id="searchInput" type="text" placeholder="Поиск города..." autocomplete="off" aria-label="Поиск города" role="combobox" aria-expanded="false" aria-controls="searchResults">
          <div class="search-results" id="searchResults" role="listbox" aria-label="Результаты поиска"></div>
        </div>
        <button class="locate-btn" id="locateBtn" title="Моё местоположение" type="button" aria-label="Определить местоположение">📍</button>
      </div>
      <div class="error">
        <div class="error-icon">😔</div>
        <div class="error-text">${msg}</div>
      </div>
    `;
    bindSearchUI(selectedCity);
  }

  function renderLoader() {
    app.innerHTML = `
      <div class="search-container">
        <div class="search-wrapper">
          <input class="search-input" id="searchInput" type="text" placeholder="Поиск города..." autocomplete="off" aria-label="Поиск города" role="combobox" aria-expanded="false" aria-controls="searchResults">
          <div class="search-results" id="searchResults" role="listbox" aria-label="Результаты поиска"></div>
        </div>
        <button class="locate-btn" id="locateBtn" title="Моё местоположение" type="button" aria-label="Определить местоположение">📍</button>
      </div>
      <div class="loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаем погоду...</div>
      </div>
    `;
    bindSearchUI(selectedCity);
  }

  async function fetchWeather(city) {
    try {
      renderLoader();
      const params = new URLSearchParams({
        latitude: city.latitude, longitude: city.longitude,
        current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,cloud_cover,surface_pressure,uv_index',
        daily: 'weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max,uv_index_max',
        hourly: 'temperature_2m,weather_code,precipitation_probability',
        timezone: city.timezone || 'Europe/Moscow',
        forecast_days: 7,
        forecast_hours: 24
      });

      const res = await fetch(`${WX_API}?${params}`);
      if (!res.ok) throw new Error('Ошибка загрузки данных');
      const data = await res.json();
      renderWeather(data, city);
    } catch (err) {
      renderError(err.message || 'Не удалось загрузить прогноз погоды');
    }
  }

  async function searchCities(query) {
    if (query.length < 2) return [];
    try {
      const params = new URLSearchParams({
        name: query,
        count: 6,
        language: 'ru',
        format: 'json'
      });
      const res = await fetch(`${GEO_API}?${params}`);
      if (!res.ok) throw new Error('Geocoding error');
      const data = await res.json();
      return data.results || [];
    } catch {
      return [];
    }
  }

  function bindSearchUI(city) {
    const input = document.getElementById('searchInput');
    const results = document.getElementById('searchResults');
    const locateBtn = document.getElementById('locateBtn');
    if (!input || !results) return;

    input.addEventListener('input', function() {
      clearTimeout(searchTimeout);
      const query = this.value.trim();
      if (query.length < 2) {
        results.classList.remove('visible');
        input.setAttribute('aria-expanded', 'false');
        return;
      }
      searchTimeout = setTimeout(async () => {
        const cities = await searchCities(query);
        if (document.getElementById('searchInput') !== input) return;
        if (input.value.trim() !== query) return;
        if (cities.length === 0) {
          results.classList.remove('visible');
          return;
        }
        results.innerHTML = cities.map(c => `
          <div class="search-result-item" role="option" data-lat="${c.latitude}" data-lon="${c.longitude}" data-tz="${c.timezone || ''}" data-name="${c.name}" data-country="${c.country || ''}">
            <div class="result-name">${c.name}</div>
            <div class="result-detail">${c.admin1 ? c.admin1 + ', ' : ''}${c.country || ''}</div>
          </div>
        `).join('');
        results.classList.add('visible');
        input.setAttribute('aria-expanded', 'true');
      }, 300);
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        results.classList.remove('visible');
        input.setAttribute('aria-expanded', 'false');
        this.blur();
      }
    });

    results.addEventListener('click', function(e) {
      const item = e.target.closest('.search-result-item');
      if (!item) return;
      const selected = {
        name: item.dataset.name,
        country: item.dataset.country,
        latitude: parseFloat(item.dataset.lat),
        longitude: parseFloat(item.dataset.lon),
        timezone: item.dataset.tz || 'Europe/Moscow'
      };
      results.classList.remove('visible');
      input.setAttribute('aria-expanded', 'false');
      input.value = '';
      saveCity(selected);
      selectedCity = selected;
      fetchWeather(selected);
    });

    if (!window._searchDocListenerAdded) {
      window._searchDocListenerAdded = true;
      document.addEventListener('click', function(e) {
        const r = document.getElementById('searchResults');
        const inp = document.getElementById('searchInput');
        if (r && !e.target.closest('.search-wrapper')) {
          r.classList.remove('visible');
          if (inp) inp.setAttribute('aria-expanded', 'false');
        }
      });
    }

    if (locateBtn) {
      locateBtn.addEventListener('click', function() {
        if (!navigator.geolocation) {
          renderError('Геолокация не поддерживается вашим браузером');
          return;
        }
        locateBtn.classList.add('locating');
        locateBtn.textContent = '⏳';
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            locateBtn.classList.remove('locating');
            locateBtn.textContent = '📍';
            const { latitude, longitude } = pos.coords;
            try {
              const params = new URLSearchParams({
                name: `${latitude.toFixed(4)},${longitude.toFixed(4)}`,
                count: 1,
                language: 'ru',
                format: 'json'
              });
              const res = await fetch(`${GEO_API}?${params}`);
              const data = await res.json();
              let city;
              if (data.results && data.results.length > 0) {
                const r = data.results[0];
                city = {
                  name: r.name,
                  country: r.country || '',
                  latitude: r.latitude,
                  longitude: r.longitude,
                  timezone: r.timezone || 'Europe/Moscow'
                };
              } else {
                city = {
                  name: `${latitude.toFixed(2)}°, ${longitude.toFixed(2)}°`,
                  country: '',
                  latitude,
                  longitude,
                  timezone: 'Europe/Moscow'
                };
              }
              saveCity(city);
              selectedCity = city;
              fetchWeather(city);
            } catch {
              locateBtn.classList.remove('locating');
              locateBtn.textContent = '📍';
              const fallbackCity = {
                name: `${latitude.toFixed(2)}°, ${longitude.toFixed(2)}°`,
                country: '',
                latitude,
                longitude,
                timezone: 'Europe/Moscow'
              };
              saveCity(fallbackCity);
              selectedCity = fallbackCity;
              fetchWeather(fallbackCity);
            }
          },
          () => {
            locateBtn.classList.remove('locating');
            locateBtn.textContent = '📍';
            renderError('Не удалось определить местоположение. Разрешите доступ к геолокации в настройках браузера.');
          },
          { enableHighAccuracy: false, timeout: 10000 }
        );
      });
    }
  }

  applyTheme(currentTheme);
  document.body.setAttribute('data-unit', currentUnit);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }

  fetchWeather(selectedCity);
})();
</script>
</body>
</html>
