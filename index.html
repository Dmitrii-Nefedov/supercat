<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прогноз погоды — Москва</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 36px 28px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeUp 0.8s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .city h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .city .date {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin-top: 4px;
    font-weight: 300;
  }

  .main-weather {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding: 10px 0;
  }

  .temp-group {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .temp-current {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    animation: pulseTemp 3s ease-in-out infinite;
  }

  @keyframes pulseTemp {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .temp-unit {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.5);
  }

  .weather-icon {
    font-size: 64px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(255, 255, 255, 0.1));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .condition {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 6px;
  }

  .feels-like {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 300;
  }

  .details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .detail-item {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    animation: fadeUp 0.8s ease-out backwards;
  }

  .detail-item:nth-child(1) { animation-delay: 0.1s; }
  .detail-item:nth-child(2) { animation-delay: 0.2s; }
  .detail-item:nth-child(3) { animation-delay: 0.3s; }

  .detail-item:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.1);
  }

  .detail-icon { font-size: 22px; margin-bottom: 6px; }
  .detail-value { font-size: 18px; font-weight: 600; }
  .detail-label { font-size: 11px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .forecast-title {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }

  .forecast {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .forecast-day {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 14px 6px;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    animation: fadeUp 0.8s ease-out backwards;
  }

  .forecast-day:nth-child(1) { animation-delay: 0.15s; }
  .forecast-day:nth-child(2) { animation-delay: 0.25s; }
  .forecast-day:nth-child(3) { animation-delay: 0.35s; }
  .forecast-day:nth-child(4) { animation-delay: 0.45s; }
  .forecast-day:nth-child(5) { animation-delay: 0.55s; }
  .forecast-day:nth-child(6) { animation-delay: 0.65s; }
  .forecast-day:nth-child(7) { animation-delay: 0.75s; }

  .forecast-day:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.12);
  }

  .forecast-day .day-name {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 6px;
  }

  .forecast-day .day-icon {
    font-size: 28px;
    margin-bottom: 4px;
  }

  .forecast-day .day-high {
    font-size: 16px;
    font-weight: 600;
  }

  .forecast-day .day-low {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 300;
  }

  .error {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.6);
  }

  .error .error-icon { font-size: 48px; margin-bottom: 12px; }
  .error .error-text { font-size: 16px; font-weight: 300; }

  .attribution {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    font-weight: 300;
  }

  .attribution a {
    color: rgba(255, 255, 255, 0.35);
    text-decoration: none;
  }

  .attribution a:hover {
    color: rgba(255, 255, 255, 0.6);
  }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; border-radius: 24px; }
    .temp-current { font-size: 56px; }
    .weather-icon { font-size: 48px; }
    .details { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .detail-item { padding: 12px 8px; }
    .detail-value { font-size: 15px; }
    .forecast { gap: 4px; }
    .forecast-day { padding: 10px 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card" id="app">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Загружаем погоду...</div>
    </div>
  </div>
  <div class="attribution">Данные: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  const API = 'https://api.open-meteo.com/v1/forecast';
  const LAT = 55.7558;
  const LON = 37.6173;

  const wmoCodes = {
    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌦️', 56: '🌧️', 57: '🌧️',
    61: '🌧️', 63: '🌧️', 65: '🌧️', 66: '🌧️', 67: '🌧️',
    71: '🌨️', 73: '🌨️', 75: '🌨️', 77: '🌨️',
    80: '🌦️', 81: '🌦️', 82: '🌦️', 85: '🌨️', 86: '🌨️',
    95: '⛈️', 96: '⛈️', 99: '⛈️'
  };

  const wmoDescriptions = {
    0: 'Ясно', 1: 'Преимущественно ясно', 2: 'Переменная облачность', 3: 'Пасмурно',
    45: 'Туман', 48: 'Изморозь', 51: 'Лёгкая морось', 53: 'Морось', 55: 'Сильная морось',
    56: 'Ледяная морось', 57: 'Сильная ледяная морось',
    61: 'Небольшой дождь', 63: 'Дождь', 65: 'Сильный дождь',
    66: 'Ледяной дождь', 67: 'Сильный ледяной дождь',
    71: 'Небольшой снег', 73: 'Снег', 75: 'Сильный снег', 77: 'Снежные зёрна',
    80: 'Ливень', 81: 'Сильный ливень', 82: 'Шквалистый ливень',
    85: 'Снегопад', 86: 'Сильный снегопад',
    95: 'Гроза', 96: 'Гроза с градом', 99: 'Сильная гроза с градом'
  };

  function getDayName(dateStr, index) {
    if (index === 0) return 'Сегодня';
    if (index === 1) return 'Завтра';
    const date = new Date(dateStr + 'T12:00:00');
    const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    return days[date.getDay()];
  }

  function render(data) {
    const current = data.current;
    const daily = data.daily;
    const code = current.weather_code;
    const icon = wmoCodes[code] || '🌤️';
    const desc = wmoDescriptions[code] || '';

    const today = new Date();
    const dateStr = today.toLocaleDateString('ru-RU', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    let forecastHtml = '';
    for (let i = 0; i < 7; i++) {
      const dayCode = daily.weather_code[i];
      forecastHtml += `<div class="forecast-day">
        <div class="day-name">${getDayName(daily.time[i], i)}</div>
        <div class="day-icon">${wmoCodes[dayCode] || '🌤️'}</div>
        <div class="day-high">${Math.round(daily.temperature_2m_max[i])}°</div>
        <div class="day-low">${Math.round(daily.temperature_2m_min[i])}°</div>
      </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <div class="city">
          <h1>Москва</h1>
          <div class="date">${dateStr}</div>
        </div>
      </div>
      <div class="main-weather">
        <div>
          <div class="condition">${desc}</div>
          <div class="temp-group">
            <span class="temp-current">${Math.round(current.temperature_2m)}</span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="feels-like">Ощущается как ${Math.round(current.apparent_temperature)}°</div>
        </div>
        <div class="weather-icon">${icon}</div>
      </div>
      <div class="details">
        <div class="detail-item">
          <div class="detail-icon">💧</div>
          <div class="detail-value">${current.relative_humidity_2m}%</div>
          <div class="detail-label">Влажность</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">💨</div>
          <div class="detail-value">${Math.round(current.wind_speed_10m)} <span style="font-size:12px;font-weight:300">км/ч</span></div>
          <div class="detail-label">Ветер</div>
        </div>
        <div class="detail-item">
          <div class="detail-icon">☁️</div>
          <div class="detail-value">${current.cloud_cover}%</div>
          <div class="detail-label">Облачность</div>
        </div>
      </div>
      <div class="forecast-title">Прогноз на неделю</div>
      <div class="forecast">${forecastHtml}</div>
    `;
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="error">
        <div class="error-icon">😔</div>
        <div class="error-text">${msg}</div>
      </div>
    `;
  }

  try {
    const params = new URLSearchParams({
      latitude: LAT, longitude: LON,
      current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,cloud_cover',
      daily: 'weather_code,temperature_2m_max,temperature_2m_min',
      timezone: 'Europe/Moscow',
      forecast_days: 7
    });

    const res = await fetch(`${API}?${params}`);
    if (!res.ok) throw new Error('Ошибка загрузки данных');
    const data = await res.json();
    render(data);
  } catch (err) {
    renderError(err.message || 'Не удалось загрузить прогноз погоды');
  }
})();
</script>
</body>
</html>
