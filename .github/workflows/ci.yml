name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check HTML validity
        uses: Cyb3r-Jak3/html5validator-action@v7.2.4
        with:
          root: "."
          css: true
          extra: --ignore-warnings

      - name: Validate JSON files
        run: |
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Check service worker syntax
        run: python3 -c "
import re
with open('sw.js') as f:
    content = f.read()
    if 'self.addEventListener' not in content:
        print('ERROR: sw.js missing self.addEventListener')
        exit(1)
    if 'install' not in content or 'fetch' not in content or 'activate' not in content:
        print('WARNING: sw.js may be missing lifecycle events')
    print('sw.js: basic checks passed')
"

      - name: Check Content-Security-Policy
        run: python3 -c "
import re
with open('index.html') as f:
    content = f.read()
    m = re.search(r'<meta http-equiv=\"Content-Security-Policy\"[^>]*content=\"([^\"]+)\"', content)
    if not m:
        print('ERROR: index.html missing Content-Security-Policy meta tag')
        exit(1)
    policy = m.group(1)
    required = ['default-src', 'style-src', 'font-src', 'connect-src', 'img-src', 'script-src']
    for d in required:
        if d not in policy:
            print(f'ERROR: CSP missing {d} directive')
            exit(1)
    print(f'CSP: OK ({len(policy)} chars)')
"

      - name: Run Python tests
        if: hashFiles('tests/test_weather.py') != ''
        run: |
          pip install pytest
          python3 -m pytest tests/test_weather.py -v

      - name: Run JavaScript tests
        if: hashFiles('tests/test_weather.js') != ''
        run: node tests/test_weather.js

      - name: Run service worker tests
        if: hashFiles('tests/test_sw.js') != ''
        run: node tests/test_sw.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check weather.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tests/ -v
