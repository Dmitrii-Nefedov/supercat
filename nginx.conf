server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/png;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    location /frontend/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.json {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /icon- {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
